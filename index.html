
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البعد العلمي - Dimensi Karya</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#cc0000',      /* Merah */
                        darkbg: '#0a0a0a',       /* Hitam pekat */
                        darkcard: '#141414',     /* Hitam sedikit abu untuk kartu */
                        lightbg: '#ffffff',      /* Putih */
                    },
                    boxShadow: {
                        '3d-light': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 8px 0px #e5e7eb',
                        '3d-dark': '0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3), 0 8px 0px #262626',
                        '3d-hover': '0 12px 15px -3px rgba(204, 0, 0, 0.3), 0 4px 6px -2px rgba(204, 0, 0, 0.1), 0 4px 0px #cc0000',
                    }
                }
            }
        }
    </script>

    <!-- Import Maps for React & Firebase -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js"
        }
    }
    </script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s, color 0.3s; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth transitions for 3D cards */
        .card-3d { transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; margin-bottom: 8px; }
        .card-3d:active { transform: translateY(4px); box-shadow: 0 4px 0px transparent !important; margin-bottom: 4px; margin-top: 4px;}
    </style>
</head>
<body class="bg-lightbg text-black dark:bg-darkbg dark:text-white pb-24">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from "react";
        import { createRoot } from "react-dom/client";
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, updateDoc, doc, query, where, onSnapshot, serverTimestamp, deleteDoc } from "firebase/firestore";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getAnalytics } from "firebase/analytics";

        // --- FIREBASE SETUP (Dari permintaan) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDJ0G2GQPMjtP8atxWDh8yX5kZdDV5UjDA",
            authDomain: "al-bud-b9af9.firebaseapp.com",
            projectId: "al-bud-b9af9",
            storageBucket: "al-bud-b9af9.firebasestorage.app",
            messagingSenderId: "414499709060",
            appId: "1:414499709060:web:1852782556776230b362d1",
            measurementId: "G-FT6STPS6TG"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let analytics;
        try {
            analytics = getAnalytics(app);
        } catch(e) {
            console.log("Analytics dicegah/ditunda", e);
        }

        // --- ICONS (SVG) ---
        const Icons = {
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Admin: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><circle cx="19" cy="11" r="2"/><path d="M19 8v2"/><path d="M19 12v2"/></svg>,
            Notes: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M6.34 17.66l-1.41 1.41"/><path d="M19.07 4.93l-1.41 1.41"/></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Back: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
                        Categories: {
                "Linguistik": () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>,
                
                "Sastra": () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>,
                
                "Opini & Esai Reflektif": () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>,
                
                // IKON BARU: Resensi (Kertas penuh catatan/list)
                "Resensi": () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/></svg>,
                
                "Sosial Politik": () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                
                // IKON BARU: Agama (Bulan dan Bintang)
                "Agama": () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/><path d="M19 3v4"/><path d="M17 5h4"/></svg>,
                
                // IKON BARU: Kebudayaan (Candi/Stupa)
                "Kebudayaan": () => <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v4"/><path d="M8 22v-4h8v4"/><path d="M10 18v-4h4v4"/><path d="M5 22h14"/><path d="M12 6L7 14h10z"/></svg>
            }


        };

        const CATEGORIES = ["Linguistik", "Sastra", "Opini & Esai Reflektif", "Resensi", "Sosial Politik", "Agama", "Kebudayaan"];

        // --- MAIN APP COMPONENT ---
        function App() {
            const [view, setView] = useState("home");
            const [activeCategory, setActiveCategory] = useState(null);
            const [activeWork, setActiveWork] = useState(null);
            const [theme, setTheme] = useState("light");
            const [userId, setUserId] = useState(null);
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [adminPin, setAdminPin] = useState("5372826");

            // Init Theme & Auth
            useEffect(() => {
                const savedTheme = localStorage.getItem("theme") || "light";
                const savedPin = localStorage.getItem("adminPin") || "5372826";
                setTheme(savedTheme);
                setAdminPin(savedPin);
                document.documentElement.className = savedTheme;

                // Sign in anonymously to track "My Works" per device without breaking UX
                signInAnonymously(auth).catch(err => console.log("Auth Error:", err));
                const unsub = onAuthStateChanged(auth, (user) => {
                    if (user) setUserId(user.uid);
                });
                return () => unsub();
            }, []);

            const toggleTheme = () => {
                const newTheme = theme === "light" ? "dark" : "light";
                setTheme(newTheme);
                localStorage.setItem("theme", newTheme);
                document.documentElement.className = newTheme;
            };

            const navigate = (page, data = null) => {
                setView(page);
                if (page === "category") setActiveCategory(data);
                if (page === "read") setActiveWork(data);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen relative flex flex-col selection:bg-primary selection:text-white">
                    {/* Navigation Bar */}
                    <nav className="fixed top-0 w-full bg-lightbg/80 dark:bg-darkbg/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-800 z-50 transition-colors duration-300 shadow-sm">
                        <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3 cursor-pointer text-primary hover:scale-105 transition-transform" onClick={() => navigate("home")}>
                                <Icons.BookOpen />
                            </div>
                            <div className="flex items-center gap-3 md:gap-5">
                                <button onClick={() => navigate("admin_login")} className="p-2 rounded-xl bg-gray-100 dark:bg-darkcard hover:text-primary transition group" title="Mode Admin">
                                    <div className="group-hover:scale-110 transition-transform"><Icons.Admin /></div>
                                </button>
                                <button onClick={() => navigate("my_works")} className="p-2 rounded-xl bg-gray-100 dark:bg-darkcard hover:text-primary transition group" title="Karya Saya">
                                    <div className="group-hover:scale-110 transition-transform"><Icons.Notes /></div>
                                </button>
                                <button onClick={toggleTheme} className="p-2 rounded-xl bg-gray-100 dark:bg-darkcard hover:text-primary transition group" title="Ubah Tema">
                                    <div className="group-hover:scale-110 transition-transform">
                                        {theme === "light" ? <Icons.Moon /> : <Icons.Sun />}
                                    </div>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <div className="pt-28 px-4 max-w-4xl mx-auto flex-grow w-full">
                        {view === "home" && <Home navigate={navigate} />}
                        {view === "writer" && <WriterPage navigate={navigate} userId={userId} />}
                        {view === "category" && <CategoryPage category={activeCategory} navigate={navigate} />}
                        {view === "read" && <ReadWork work={activeWork} navigate={navigate} />}
                        {view === "my_works" && <MyWorks userId={userId} navigate={navigate} />}
                        {view === "admin_login" && <AdminLogin navigate={navigate} setIsAdminMode={setIsAdminMode} savedPin={adminPin} />}
                        {view === "admin_dashboard" && isAdminMode && <AdminDashboard navigate={navigate} setAdminPin={setAdminPin} />}
                    </div>

                    {/* Footer */}
                    <footer className="text-center p-8 mt-10 border-t border-gray-200 dark:border-gray-800">
                        <p className="text-sm text-gray-600 dark:text-gray-400 font-medium">
                            2026 divisi penelitian dan pengembangan HMPS BSA UIN Syarif Hidayatullah Jakarta
                        </p>
                    </footer>

                    {/* Floating Add Button (Only on Home) */}
                    {view === "home" && (
                        <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-40">
                            <button 
                                onClick={() => navigate("writer")}
                                className="bg-primary hover:bg-red-700 text-white p-4 rounded-full shadow-[0_0_20px_rgba(204,0,0,0.4)] transition-all duration-300 hover:scale-110 hover:shadow-[0_0_25px_rgba(204,0,0,0.6)] flex items-center justify-center group border-2 border-transparent hover:border-white/20"
                            >
                                <div className="group-hover:rotate-90 transition-transform duration-300">
                                    <Icons.Plus />
                                </div>
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // --- HOME PAGE ---
        function Home({ navigate }) {
            return (
                <div className="flex flex-col items-center animate-fade-in w-full pb-10">
                    <h1 className="text-5xl md:text-6xl font-bold text-center mb-12 text-primary tracking-wide drop-shadow-sm font-serif">
                        البعد العلمي
                    </h1>
                    
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-5 md:gap-8 w-full px-2">
                        {CATEGORIES.map(cat => {
                            const IconComp = Icons.Categories[cat];
                            return (
                                <button 
                                    key={cat}
                                    onClick={() => navigate("category", cat)}
                                    className="card-3d flex flex-col items-center justify-center p-8 bg-white dark:bg-darkcard rounded-3xl shadow-3d-light dark:shadow-3d-dark border border-gray-100 dark:border-gray-800 hover:shadow-3d-hover hover:-translate-y-2 group"
                                >
                                    <div className="text-black dark:text-white mb-4 group-hover:text-primary transition-colors duration-300">
                                        <IconComp />
                                    </div>
                                    <span className="text-sm md:text-base font-bold text-center text-gray-800 dark:text-gray-200 group-hover:text-primary transition-colors">
                                        {cat}
                                    </span>
                                </button>
                            )
                        })}
                    </div>
                </div>
            );
        }

        // --- WRITER PAGE ---
        function WriterPage({ navigate, userId }) {
            const [form, setForm] = useState({ kategori: CATEGORIES[0], namaPenulis: "", judul: "", konten: "" });
            const [loading, setLoading] = useState(false);

            const handleChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if(!form.namaPenulis || !form.judul || !form.konten) return alert("Harap isi semua kolom dengan lengkap.");
                
                setLoading(true);
                try {
                    await addDoc(collection(db, "karya"), {
                        userId: userId || "anonymous",
                        ...form,
                        status: "menunggu",
                        timestamp: serverTimestamp()
                    });
                    alert("Karya berhasil dikirim! Saat ini sedang ditinjau oleh Admin.");
                    navigate("my_works");
                } catch (error) {
                    alert("Terjadi kesalahan jaringan: " + error.message);
                }
                setLoading(false);
            };

            return (
                <div className="max-w-2xl mx-auto w-full bg-white dark:bg-darkcard p-6 md:p-8 rounded-3xl shadow-sm border border-gray-200 dark:border-gray-800">
                    <div className="flex items-center justify-between mb-8">
                        <button onClick={() => navigate("home")} className="flex items-center gap-2 text-gray-500 hover:text-primary font-bold transition">
                            <Icons.Back /> Batal
                        </button>
                        <h2 className="text-2xl font-bold text-primary">Tulis Karya</h2>
                    </div>
                    
                    <form onSubmit={handleSubmit} className="space-y-5">
                        <div className="flex flex-col gap-1">
                            <label className="text-sm font-bold text-gray-700 dark:text-gray-300">Kategori</label>
                            <select name="kategori" value={form.kategori} onChange={handleChange} className="w-full p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary focus:ring-2 focus:ring-red-500/20 transition-all font-semibold cursor-pointer">
                                {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                            </select>
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-sm font-bold text-gray-700 dark:text-gray-300">Nama Penulis</label>
                            <input type="text" name="namaPenulis" value={form.namaPenulis} onChange={handleChange} className="w-full p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary focus:ring-2 focus:ring-red-500/20 transition-all" placeholder="Masukkan nama Anda" />
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-sm font-bold text-gray-700 dark:text-gray-300">Judul Karya</label>
                            <input type="text" name="judul" value={form.judul} onChange={handleChange} className="w-full p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary focus:ring-2 focus:ring-red-500/20 transition-all" placeholder="Masukkan judul tulisan" />
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-sm font-bold text-gray-700 dark:text-gray-300">Isi Tulisan</label>
                            <textarea name="konten" value={form.konten} onChange={handleChange} rows="12" className="w-full p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary focus:ring-2 focus:ring-red-500/20 transition-all resize-y leading-relaxed" placeholder="Mulai tuangkan karya Anda di sini..."></textarea>
                        </div>
                        <button type="submit" disabled={loading} className="w-full bg-primary hover:bg-red-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-red-500/40 disabled:opacity-50 mt-4 text-lg">
                            {loading ? "Memproses..." : "Publish Karya"}
                        </button>
                    </form>
                </div>
            );
        }

        // --- CATEGORY PAGE (List Approved Works) ---
        function CategoryPage({ category, navigate }) {
            const [works, setWorks] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if(!category) return;
                const q = query(collection(db, "karya"), where("kategori", "==", category), where("status", "==", "terbit"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({id: doc.id, ...doc.data()}));
                    data.sort((a,b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                    setWorks(data);
                    setLoading(false);
                }, (err) => {
                    console.error("Gagal mengambil data:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [category]);

            return (
                <div className="animate-fade-in w-full">
                    <div className="flex items-center gap-4 mb-8 border-b border-gray-200 dark:border-gray-800 pb-4">
                        <button onClick={() => navigate("home")} className="p-2 bg-gray-100 dark:bg-darkcard rounded-full hover:text-primary transition">
                            <Icons.Back />
                        </button>
                        <h2 className="text-3xl font-bold text-primary">{category}</h2>
                    </div>
                    
                    {loading ? <div className="text-center py-10 font-bold text-gray-500">Memuat karya...</div> : 
                     works.length === 0 ? <div className="text-center py-20 bg-gray-50 dark:bg-darkcard rounded-3xl border border-dashed border-gray-300 dark:border-gray-700"><p className="text-gray-500 font-medium text-lg">Belum ada karya terbit di kategori ini.</p></div> : (
                        <div className="grid gap-5">
                            {works.map(work => (
                                <div key={work.id} onClick={() => navigate("read", work)} className="bg-white dark:bg-darkcard p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 cursor-pointer hover:shadow-md hover:border-primary dark:hover:border-primary transition group">
                                    <h3 className="text-2xl font-bold group-hover:text-primary transition mb-2">{work.judul}</h3>
                                    <div className="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400 font-semibold mb-3">
                                        <div className="w-6 h-6 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-xs text-black dark:text-white">{work.namaPenulis.charAt(0).toUpperCase()}</div>
                                        {work.namaPenulis}
                                    </div>
                                    <p className="text-gray-700 dark:text-gray-300 line-clamp-3 text-base leading-relaxed">{work.konten}</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // --- READ WORK ---
        function ReadWork({ work, navigate }) {
            if(!work) return null;
            return (
                <div className="max-w-3xl mx-auto bg-white dark:bg-darkcard p-6 md:p-10 rounded-3xl shadow-sm border border-gray-200 dark:border-gray-800 animate-fade-in">
                    <button onClick={() => navigate("category", work.kategori)} className="flex items-center gap-2 text-gray-500 hover:text-primary mb-8 font-bold transition">
                        <Icons.Back /> Kembali ke {work.kategori}
                    </button>
                    
                    <div className="mb-10 text-center">
                        <span className="inline-block px-4 py-1.5 bg-red-100 text-primary dark:bg-red-900/30 rounded-full text-xs font-bold uppercase tracking-widest mb-6">
                            {work.kategori}
                        </span>
                        <h1 className="text-4xl md:text-5xl font-extrabold mb-6 leading-tight">{work.judul}</h1>
                        <p className="text-gray-500 dark:text-gray-400 font-medium text-lg">Ditulis oleh <span className="font-bold text-black dark:text-white">{work.namaPenulis}</span></p>
                    </div>
                    
                    <div className="prose dark:prose-invert max-w-none text-lg leading-loose whitespace-pre-wrap text-gray-800 dark:text-gray-200">
                        {work.konten}
                    </div>
                </div>
            );
        }

        // --- MY WORKS ---
        function MyWorks({ userId, navigate }) {
            const [myWorks, setMyWorks] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if(!userId) return;
                const q = query(collection(db, "karya"), where("userId", "==", userId));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({id: doc.id, ...doc.data()}));
                    data.sort((a,b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                    setMyWorks(data);
                    setLoading(false);
                }, (err) => {
                    console.error(err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [userId]);

            const Badge = ({status}) => {
                if(status === 'terbit') return <span className="bg-green-100 text-green-700 px-3 py-1 rounded-md text-xs font-bold border border-green-200">TERBIT</span>;
                if(status === 'ditolak') return <span className="bg-red-100 text-red-700 px-3 py-1 rounded-md text-xs font-bold border border-red-200">DITOLAK</span>;
                return <span className="bg-orange-100 text-orange-700 px-3 py-1 rounded-md text-xs font-bold border border-orange-200">MENUNGGU TINJAUAN</span>;
            }

            return (
                <div className="max-w-3xl mx-auto w-full">
                    <div className="flex items-center gap-4 mb-8 border-b border-gray-200 dark:border-gray-800 pb-4">
                        <button onClick={() => navigate("home")} className="p-2 bg-gray-100 dark:bg-darkcard rounded-full hover:text-primary transition">
                            <Icons.Back />
                        </button>
                        <h2 className="text-3xl font-bold flex items-center gap-3 text-primary">
                            <Icons.Notes /> Data Karya Saya
                        </h2>
                    </div>
                    
                    {loading ? <p className="text-center py-10 font-bold">Memuat data...</p> : myWorks.length === 0 ? (
                        <div className="text-center py-20 bg-gray-50 dark:bg-darkcard rounded-3xl border border-dashed border-gray-300 dark:border-gray-700">
                            <Icons.Notes className="mx-auto text-gray-400 mb-4 w-12 h-12" />
                            <p className="text-lg font-medium text-gray-600 dark:text-gray-400">Catatan karya kosong.</p>
                            <button onClick={() => navigate("writer")} className="mt-6 bg-primary text-white px-6 py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-lg">Mulai Menulis</button>
                        </div>
                    ) : (
                        <div className="grid gap-5">
                            {myWorks.map(work => (
                                <div key={work.id} className="bg-white dark:bg-darkcard p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-2 h-full" style={{backgroundColor: work.status === 'terbit' ? '#22c55e' : work.status === 'ditolak' ? '#ef4444' : '#f97316'}}></div>
                                    <div className="flex justify-between items-start mb-3 ml-2">
                                        <h3 className="text-xl font-bold">{work.judul}</h3>
                                        <Badge status={work.status} />
                                    </div>
                                    <p className="text-sm font-bold text-gray-500 dark:text-gray-400 mb-4 ml-2 uppercase tracking-wide">{work.kategori}</p>
                                    <div className="ml-2 text-sm line-clamp-3 text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-[#111] p-4 rounded-xl border border-gray-100 dark:border-gray-800 leading-relaxed italic">
                                        "{work.konten}"
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // --- ADMIN LOGIN ---
        function AdminLogin({ navigate, setIsAdminMode, savedPin }) {
            const [pin, setPin] = useState("");
            const [error, setError] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                if(pin === savedPin) {
                    setIsAdminMode(true);
                    navigate("admin_dashboard");
                } else {
                    setError(true);
                    setPin("");
                }
            };

            return (
                <div className="max-w-md mx-auto mt-10">
                    <button onClick={() => navigate("home")} className="flex items-center gap-2 text-gray-500 hover:text-primary mb-8 font-bold">
                        <Icons.Back /> Kembali
                    </button>
                    <div className="bg-white dark:bg-darkcard p-10 rounded-3xl shadow-xl border border-gray-200 dark:border-gray-800 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-primary"></div>
                        <div className="w-20 h-20 bg-red-50 dark:bg-red-900/20 text-primary rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                            <Icons.Admin />
                        </div>
                        <h2 className="text-3xl font-extrabold mb-8">Login Admin</h2>
                        <form onSubmit={handleLogin}>
                            <input 
    type="password" 
    value={pin} 
    onChange={e => {setPin(e.target.value); setError(false);}} 
    placeholder="Masukkan PIN Admin" 
    className="w-full text-center text-lg p-4 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary transition mb-6"
    autoFocus
/>

                            {error && <p className="text-primary font-bold text-sm mb-4 animate-bounce">PIN tidak valid!</p>}
                            <button type="submit" className="w-full bg-primary hover:bg-red-700 text-white font-bold py-4 rounded-xl transition shadow-lg hover:shadow-red-500/40 text-lg">
                                Masuk Sistem
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // --- ADMIN DASHBOARD ---
        function AdminDashboard({ navigate, setAdminPin }) {
            const [allWorks, setAllWorks] = useState([]);
            const [loading, setLoading] = useState(true);
            const [tab, setTab] = useState('menunggu');
            const [editingWork, setEditingWork] = useState(null);
            
            const [showSettings, setShowSettings] = useState(false);
            const [masterPin, setMasterPin] = useState("");
            const [newPin, setNewPin] = useState("");

            useEffect(() => {
                const unsubscribe = onSnapshot(collection(db, "karya"), (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({id: doc.id, ...doc.data()}));
                    data.sort((a,b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                    setAllWorks(data);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const updateStatus = async (id, status) => {
                if(confirm(`Konfirmasi: Ubah status karya ini menjadi ${status.toUpperCase()}?`)) {
                    await updateDoc(doc(db, "karya", id), { status });
                }
            };

            // FUNGSI BARU: Hapus Karya Permanen
            const handleDelete = async (id) => {
                if(confirm("PERINGATAN! Apakah Anda yakin ingin menghapus karya ini secara permanen? Data yang dihapus tidak dapat dikembalikan.")) {
                    try {
                        await deleteDoc(doc(db, "karya", id));
                        alert("Karya berhasil dihapus secara permanen dari database.");
                    } catch (error) {
                        alert("Gagal menghapus karya: " + error.message);
                    }
                }
            };

            const handleEditSave = async (e) => {
                e.preventDefault();
                await updateDoc(doc(db, "karya", editingWork.id), {
                    judul: editingWork.judul,
                    namaPenulis: editingWork.namaPenulis,
                    kategori: editingWork.kategori,
                    konten: editingWork.konten
                });
                setEditingWork(null);
                alert("Data karya berhasil diperbarui.");
            };

            const handleChangePin = (e) => {
                e.preventDefault();
                if(masterPin === "7353828") {
                    setAdminPin(newPin);
                    localStorage.setItem("adminPin", newPin);
                    alert("Berhasil! PIN Admin telah diubah.");
                    setMasterPin(""); setNewPin(""); setShowSettings(false);
                } else {
                    alert("PIN Master salah!");
                }
            };

            const filteredWorks = allWorks.filter(w => w.status === tab);

            return (
                <div className="w-full animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 bg-white dark:bg-darkcard p-6 rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm">
                        <div>
                            <h2 className="text-3xl font-extrabold text-primary flex items-center gap-3">
                                <Icons.Admin /> Panel Admin
                            </h2>
                            <p className="text-gray-500 font-medium mt-1">Kelola data penulis dan karya.</p>
                        </div>
                        <div className="flex gap-3 w-full md:w-auto">
                            <button onClick={() => setShowSettings(!showSettings)} className="flex-1 md:flex-none px-5 py-3 bg-gray-100 dark:bg-darkbg hover:bg-gray-200 dark:hover:bg-gray-800 rounded-xl font-bold transition">Pengaturan</button>
                            <button onClick={() => { navigate("home"); window.location.reload(); }} className="flex-1 md:flex-none px-5 py-3 bg-red-100 text-red-700 hover:bg-red-200 rounded-xl font-bold transition">Tutup Panel</button>
                        </div>
                    </div>

                    {showSettings && (
                        <div className="bg-gray-50 dark:bg-darkcard p-6 rounded-2xl border-2 border-gray-200 dark:border-gray-700 mb-8">
                            <h3 className="font-bold text-xl mb-4 text-primary">Ubah PIN Akses Admin</h3>
                            <form onSubmit={handleChangePin} className="flex flex-col sm:flex-row gap-4 items-end">
                                <div className="flex-1 w-full">
                                    <label className="text-sm font-bold mb-2 block text-gray-700 dark:text-gray-300">PIN Master (Wajib)</label>
                                    <input type="password" value={masterPin} onChange={e=>setMasterPin(e.target.value)} className="w-full p-3 rounded-xl border-2 border-gray-300 dark:border-gray-700 bg-white dark:bg-darkbg outline-none focus:border-primary tracking-widest font-mono" required />
                                </div>
                                <div className="flex-1 w-full">
                                    <label className="text-sm font-bold mb-2 block text-gray-700 dark:text-gray-300">PIN Baru</label>
                                    <input type="password" value={newPin} onChange={e=>setNewPin(e.target.value)} className="w-full p-3 rounded-xl border-2 border-gray-300 dark:border-gray-700 bg-white dark:bg-darkbg outline-none focus:border-primary tracking-widest font-mono" required />
                                </div>
                                <button type="submit" className="bg-primary hover:bg-red-700 text-white px-8 py-3 rounded-xl font-bold h-[52px] w-full sm:w-auto transition shadow-lg">Ubah PIN</button>
                            </form>
                        </div>
                    )}

                    <div className="flex gap-3 mb-8 overflow-x-auto hide-scrollbar pb-2">
                        {[
                            {id: 'menunggu', label: 'Menunggu Tinjauan', color: 'orange'}, 
                            {id: 'terbit', label: 'Berhasil Terbit', color: 'green'}, 
                            {id: 'ditolak', label: 'Ditolak', color: 'red'}
                        ].map(t => (
                            <button 
                                key={t.id} 
                                onClick={() => setTab(t.id)}
                                className={`px-6 py-3 rounded-xl font-bold whitespace-nowrap border-2 transition-all ${tab === t.id ? 'bg-primary border-primary text-white shadow-md' : 'bg-white dark:bg-darkcard border-gray-200 dark:border-gray-800 text-gray-500 hover:border-gray-300 dark:hover:border-gray-700'}`}
                            >
                                {t.label} <span className={`ml-2 px-2 py-0.5 rounded-md text-xs bg-white/20 dark:bg-black/20`}>{allWorks.filter(w=>w.status===t.id).length}</span>
                            </button>
                        ))}
                    </div>

                    {loading ? <div className="text-center font-bold py-10">Memuat database...</div> : (
                        <div className="grid gap-5">
                            {filteredWorks.map(work => (
                                <div key={work.id} className="bg-white dark:bg-darkcard p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 flex flex-col lg:flex-row gap-6 justify-between">
                                    <div className="flex-1 w-full">
                                        <div className="flex items-center gap-3 mb-2">
                                            <span className="text-xs font-bold uppercase px-2 py-1 bg-gray-100 dark:bg-gray-800 rounded">{work.kategori}</span>
                                            <h3 className="text-xl font-extrabold">{work.judul}</h3>
                                        </div>
                                        <p className="text-sm font-semibold text-primary mb-4">Penulis: {work.namaPenulis}</p>
                                        <div className="text-sm text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-[#111] p-4 rounded-xl border border-gray-100 dark:border-gray-800 h-32 overflow-y-auto leading-relaxed">
                                            {work.konten}
                                        </div>
                                    </div>
                                    
                                    {/* AREA TOMBOL AKSI ADMIN */}
                                    <div className="flex lg:flex-col gap-2 justify-center lg:w-40 shrink-0 border-t lg:border-t-0 lg:border-l border-gray-200 dark:border-gray-800 pt-4 lg:pt-0 lg:pl-6">
                                        <button onClick={() => setEditingWork(work)} className="flex-1 bg-blue-100 text-blue-700 hover:bg-blue-200 py-3 rounded-xl font-bold text-sm transition">Edit Data</button>
                                        
                                        {tab !== 'terbit' && <button onClick={() => updateStatus(work.id, 'terbit')} className="flex-1 bg-green-100 text-green-700 hover:bg-green-200 py-3 rounded-xl font-bold text-sm transition">Terbitkan</button>}
                                        
                                        {tab !== 'ditolak' && <button onClick={() => updateStatus(work.id, 'ditolak')} className="flex-1 bg-orange-100 text-orange-700 hover:bg-orange-200 py-3 rounded-xl font-bold text-sm transition">Tolak Karya</button>}
                                        
                                        {tab !== 'menunggu' && <button onClick={() => updateStatus(work.id, 'menunggu')} className="flex-1 bg-yellow-100 text-yellow-700 hover:bg-yellow-200 py-3 rounded-xl font-bold text-sm transition">Tinjau Ulang</button>}
                                        
                                        {/* TOMBOL HAPUS - Khusus untuk tab Terbit (atau bisa juga ditolak) */}
                                        {(tab === 'terbit' || tab === 'ditolak') && (
                                            <button onClick={() => handleDelete(work.id)} className="flex-1 bg-red-100 text-primary hover:bg-red-200 py-3 rounded-xl font-bold text-sm transition mt-1 border border-red-200 dark:border-red-900/50">Hapus Permanen</button>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {filteredWorks.length === 0 && <div className="text-center text-gray-500 font-medium py-16 bg-gray-50 dark:bg-darkcard rounded-3xl border border-dashed border-gray-300 dark:border-gray-700">Tidak ada data karya di status ini.</div>}
                        </div>
                    )}

                    {/* EDIT MODAL */}
                    {editingWork && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white dark:bg-darkcard p-8 rounded-3xl w-full max-w-3xl max-h-[90vh] overflow-y-auto shadow-2xl border border-gray-200 dark:border-gray-800">
                                <h3 className="text-2xl font-bold mb-6 text-primary border-b border-gray-200 dark:border-gray-800 pb-4">Edit Karya Penulis</h3>
                                <form onSubmit={handleEditSave} className="space-y-5">
                                    <div>
                                        <label className="text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 block">Judul</label>
                                        <input type="text" value={editingWork.judul} onChange={e=>setEditingWork({...editingWork, judul: e.target.value})} className="w-full p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary" />
                                    </div>
                                    <div>
                                        <label className="text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 block">Nama Penulis</label>
                                        <input type="text" value={editingWork.namaPenulis} onChange={e=>setEditingWork({...editingWork, namaPenulis: e.target.value})} className="w-full p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary" />
                                    </div>
                                    <div>
                                        <label className="text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 block">Kategori</label>
                                        <select value={editingWork.kategori} onChange={e=>setEditingWork({...editingWork, kategori: e.target.value})} className="w-full p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary">
                                            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 block">Konten Teks</label>
                                        <textarea value={editingWork.konten} onChange={e=>setEditingWork({...editingWork, konten: e.target.value})} rows="10" className="w-full p-3 rounded-xl border-2 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-darkbg outline-none focus:border-primary resize-y"></textarea>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="submit" className="flex-1 bg-primary hover:bg-red-700 text-white py-4 rounded-xl font-bold transition shadow-lg text-lg">Simpan Perubahan</button>
                                        <button type="button" onClick={()=>setEditingWork(null)} className="flex-1 bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 py-4 rounded-xl font-bold transition text-lg">Batal</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
